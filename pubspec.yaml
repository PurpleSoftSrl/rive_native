name: rive_native
# Pub base 0.1.4 + Android AGP 9 (built-in Kotlin). Upstream publishes only to pub.dev (no public git).
version: 0.1.4+purplesoft.1
homepage: https://rive.app
repository: https://github.com/PurpleSoftSrl/rive_native
description: Rive's native runtime and renderer for Flutter. PurpleSoft fork with AGP 9–compatible Android Gradle config.
topics:
  - animation
  - ui
  - effects
  - renderer
  - games

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.28.0"

dependencies:
  ffi: ^2.1.2
  vector_math: ^2.1.4
  plugin_platform_interface: ^2.0.2
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  meta: ^1.12.0
  graphs: ^2.0.0
  args: ^2.5.0
  path: ^1.9.0
  http: ">=0.13.3 <2.0.0"

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: app.rive.rive_native
        pluginClass: RiveNativePlugin
        ffiPlugin: true
      ios:
        pluginClass: RiveNativePlugin
        ffiPlugin: true
      macos:
        pluginClass: RiveNativePlugin
        ffiPlugin: true
      windows:
        pluginClass: RiveNativePlugin
        ffiPlugin: true
      linux:
        pluginClass: RiveNativePlugin
        ffiPlugin: true
      web:
        pluginClass: RiveNativePlugin
        fileName: rive_native_plugin_web.dart
